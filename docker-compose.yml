version: '3.8'

services:
  mysql-db:
    image: mysql:8.0
    container_name: taskmanager_mysql
    environment:
      MYSQL_USER: taskuser
      MYSQL_ROOT_PASSWORD: 1234123
      MYSQL_PASSWORD: 12341234
      MYSQL_DATABASE: taskmanager
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped

  postgres-db:
    image: postgres:15
    container_name: taskmanager_postgres
    environment:
      POSTGRES_USER: taskuser
      POSTGRES_PASSWORD: 12341234
      POSTGRES_DB: taskmanager
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  mysql_data:
  postgres_data: